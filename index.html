<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
  -webkit-tap-highlight-color: transparent;
}

body{
  margin:0;
  font-family:'Fredoka',sans-serif;
  background:#efe6d6;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding-top:60px;
  height:100vh;
}

.container{
  width:420px;
  background:#fff;
  border:2px solid #000;
  border-radius:28px;
  padding:30px;
  box-shadow:4px 4px 0 rgba(0,0,0,0.7);
  text-align:center;
}

.title{
  font-size:30px;
  font-weight:700;
  margin-bottom:25px;
}

.vote-wrap{
  display:flex;
  gap:20px;
  justify-content:center;
}

.btn{
  width:170px;
  height:170px;
  border-radius:22px;
  border:2px solid #000;
  box-shadow:4px 4px 0 rgba(0,0,0,0.7);
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  position:relative;
  transition:0.1s;
}

.btn img{
  width:95px;
  height:95px;
  object-fit:cover;
  border-radius:12px;
  border:2px solid #000;
  margin-bottom:8px;
}

.btn span{
  font-size:17px;
  font-weight:600;
  color:white;
}

.btn:active{
  transform:scale(0.95);
}

.marshall{
  background:#ff7a3d;
}

.jayden{
  background:#36c26e;
}

.result{
  margin-top:25px;
  font-size:19px;
  font-weight:600;
}

.winner-box{
  margin-top:25px;
  height:130px;
  background:#fff;
  border:2px solid #000;
  border-radius:18px;
  box-shadow:4px 4px 0 rgba(0,0,0,0.7);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  font-weight:600;
  text-align:center;
  padding:10px;
}

.plus{
  position:absolute;
  top:10px;
  right:10px;
  font-size:22px;
  font-weight:bold;
  color:#fff;
  animation:pop 0.8s forwards;
}

@keyframes pop{
  0%{
    opacity:0;
    transform:translateY(10px);
  }
  50%{
    opacity:1;
  }
  100%{
    opacity:0;
    transform:translateY(-20px);
  }
}

.credit{
  margin-top:15px;
  font-size:14px;
  opacity:0.8;
}

.credit a{
  color:#007bff;
  text-decoration:none;
  font-weight:600;
}

.emoji{
  position:fixed;
  font-size:42px;
  animation:float 4s linear forwards;
}

@keyframes float{
  0%{
    transform:translateY(100vh);
  }
  100%{
    transform:translateY(-10vh);
    opacity:0;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="title">🔥 PILIH CUII 🔥</div>

  <div class="vote-wrap">

    <div class="btn marshall" onclick="vote('marshall', this)">
      <img src="marshall.jpg">
      <span>MARSHALL</span>
    </div>

    <div class="btn jayden" onclick="vote('jayden', this)">
      <img src="jayden.jpg">
      <span>JAYDEN</span>
    </div>

  </div>

  <div class="result" id="resultText">
    ⏳ Hasil Vote Diumumin 12 Mei 2026
  </div>

  <div class="winner-box" id="winnerText">
    ⏳ Pemenang Diumumin 12 Mei 2026
  </div>

  <div class="credit">
    buatan
    <a href="https://wa.me/6282189289988" target="_blank">
      Exel butuh duit
    </a>
  </div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getFirestore,
  doc,
  getDoc,
  updateDoc,
  increment
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCQonEKVzZlxt_iZAQdtDNj0mHYDxKjfXo",
  authDomain: "jaydenormarshall.firebaseapp.com",
  projectId: "jaydenormarshall",
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const voteRef = doc(
  db,
  "votes",
  "marshallvsjayden"
);

let voted =
localStorage.getItem("voted_marshallvsjayden");

function disableButtons(){

  document.querySelectorAll(".btn")
  .forEach(b=>{

    b.style.opacity="0.5";
    b.style.pointerEvents="none";

  });

}

if(voted){
  disableButtons();
}

const emojis = ["🔥","💥","🎉","😍","⚡"];

setInterval(()=>{

  const e = document.createElement("div");

  e.className="emoji";

  e.innerText =
  emojis[Math.floor(Math.random()*emojis.length)];

  e.style.left = Math.random()*100+"%";

  document.body.appendChild(e);

  setTimeout(()=>e.remove(),4000);

},700);

window.vote = async function(name, el){

  if(voted){

    alert("Udah vote, jangan rakus");
    return;

  }

  voted = true;

  disableButtons();

  localStorage.setItem(
    "voted_marshallvsjayden",
    "yes"
  );

  const plus =
  document.createElement("div");

  plus.className="plus";

  plus.innerText="+1";

  el.appendChild(plus);

  setTimeout(()=>plus.remove(),800);

  await updateDoc(voteRef,{
    [name]: increment(1)
  });

}

async function load(){

  const snap = await getDoc(voteRef);

  const data = snap.data() || {
    marshall:0,
    jayden:0
  };

  const now = new Date();

  const end =
  new Date("2026-05-12T12:00:00");

  if(now < end){

    resultText.innerHTML =
    "⏳ Hasil Vote Diumumin 12 Mei 2026";

    winnerText.innerHTML =
    "⏳ Pemenang Diumumin 12 Mei 2026";

  }else{

    if(data.marshall > data.jayden){

      resultText.innerHTML = `
        <span style="color:#f5b301">
          Marshall: ${data.marshall}
        </span>
        |
        Jayden: ${data.jayden}
      `;

      winnerText.innerHTML =
      "🏆 MARSHALL MENANG";

    }

    else if(data.jayden > data.marshall){

      resultText.innerHTML = `
        Marshall: ${data.marshall}
        |
        <span style="color:#f5b301">
          Jayden: ${data.jayden}
        </span>
      `;

      winnerText.innerHTML =
      "🏆 JAYDEN MENANG";

    }

    else{

      resultText.innerHTML = `
        <span style="color:#f5b301">
          Marshall: ${data.marshall}
        </span>
        |
        <span style="color:#f5b301">
          Jayden: ${data.jayden}
        </span>
      `;

      winnerText.innerHTML =
      "🤝 SERI";

    }

  }

}

load();

</script>

</body>
</html>
