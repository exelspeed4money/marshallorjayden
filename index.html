<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
  -webkit-tap-highlight-color: transparent;
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:'Fredoka',sans-serif;
  background:#efe6d6;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding-top:60px;
  min-height:100vh;
  overflow-x:hidden;
}

.container{
  width:420px;
  background:#fff;
  border:2px solid #000;
  border-radius:28px;
  padding:30px;
  box-shadow:4px 4px 0 rgba(0,0,0,0.7);
  text-align:center;
}

.title{
  font-size:30px;
  font-weight:700;
  margin-bottom:25px;
}

.vote-wrap{
  display:flex;
  gap:20px;
  justify-content:center;
}

.btn{
  width:170px;
  height:170px;
  border-radius:22px;
  border:2px solid #000;
  box-shadow:4px 4px 0 rgba(0,0,0,0.7);
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  position:relative;
  transition:0.1s;
}

.btn:active{
  transform:scale(0.95);
}

.btn img{
  width:95px;
  height:95px;
  object-fit:cover;
  border-radius:12px;
  border:2px solid #000;
  margin-bottom:8px;
}

.btn span{
  font-size:17px;
  font-weight:700;
  color:#fff;
}

.marshall{
  background:#ff7a3d;
}

.jayden{
  background:#36c26e;
}

.result{
  margin-top:25px;
  font-size:20px;
  font-weight:700;
  display:none;
}

.winner-box{
  margin-top:25px;
  height:130px;
  background:#fff;
  border:2px solid #000;
  border-radius:18px;
  box-shadow:4px 4px 0 rgba(0,0,0,0.7);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:21px;
  font-weight:700;
}

.credit{
  margin-top:15px;
  font-size:14px;
  opacity:0.8;
}

.credit a{
  color:#007bff;
  text-decoration:none;
  font-weight:700;
}

.plus{
  position:absolute;
  top:10px;
  right:12px;
  font-size:24px;
  color:#fff;
  font-weight:700;
  animation:pop 0.8s forwards;
}

@keyframes pop{
  0%{
    opacity:0;
    transform:translateY(10px);
  }
  50%{
    opacity:1;
  }
  100%{
    opacity:0;
    transform:translateY(-20px);
  }
}

.emoji{
  position:fixed;
  font-size:42px;
  animation:float 4s linear forwards;
  pointer-events:none;
}

@keyframes float{
  0%{
    transform:translateY(100vh);
  }
  100%{
    transform:translateY(-10vh);
    opacity:0;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="title">🔥 PILIH CUII 🔥</div>

  <div class="vote-wrap">

    <div class="btn marshall" onclick="vote('marshall', this)">
      <img src="marshall.jpg">
      <span>MARSHALL</span>
    </div>

    <div class="btn jayden" onclick="vote('jayden', this)">
      <img src="jayden.jpg">
      <span>JAYDEN</span>
    </div>

  </div>

  <div class="result" id="resultText"></div>

  <div class="winner-box" id="winnerText">
    ⏳ Diumumin 10 Mei 2026 (12:00)
  </div>

  <div class="credit">
    buatan <a href="https://wa.me/6282189289988" target="_blank">Exel butuh duit</a>
  </div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getFirestore,
  doc,
  getDoc,
  updateDoc,
  increment
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCQonEKVzZlxt_iZAQdtDNj0mHYDxKjfXo",
  authDomain: "jaydenormarshall.firebaseapp.com",
  projectId: "jaydenormarshall",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const voteRef = doc(db,"votes","marshallvsjayden");

let voted = localStorage.getItem("voted_marshallvsjayden");

function disableButtons(){
  document.querySelectorAll(".btn").forEach(btn=>{
    btn.style.opacity="0.5";
    btn.style.pointerEvents="none";
  });
}

if(voted){
  disableButtons();
}

/* emoji random */
const emojis = ["🔥","💥","⚡","🎉","😍"];

setInterval(()=>{
  const e = document.createElement("div");

  e.className="emoji";
  e.innerText = emojis[Math.floor(Math.random()*emojis.length)];

  e.style.left = Math.random()*100 + "%";

  document.body.appendChild(e);

  setTimeout(()=>{
    e.remove();
  },4000);

},700);

/* vote */
window.vote = async function(name, el){

  if(voted){
    alert("Udah vote, jangan rakus");
    return;
  }

  /* efek +1 */
  const plus = document.createElement("div");

  plus.className="plus";
  plus.innerText="+1";

  el.appendChild(plus);

  setTimeout(()=>{
    plus.remove();
  },800);

  await updateDoc(voteRef,{
    [name]: increment(1)
  });

  localStorage.setItem("voted_marshallvsjayden","yes");

  voted = true;

  disableButtons();

  load(true);
}

/* load data */
async function load(show=false){

  const snap = await getDoc(voteRef);

  const data = snap.data() || {
    marshall:0,
    jayden:0
  };

  if(show || localStorage.getItem("voted_marshallvsjayden")){
    resultText.style.display="block";
  }

  if(!show && !localStorage.getItem("voted_marshallvsjayden")){
    resultText.innerText = "Marshall: ? | Jayden: ?";
  }else{
    resultText.innerText =
      "Marshall: " + data.marshall +
      " | Jayden: " + data.jayden;
  }

  const now = new Date();

  const end = new Date("2026-05-10T12:00:00");

  if(now > end){

    if(data.marshall > data.jayden){

      winnerText.innerText =
      "🏆 MARSHALL MENANG";

    }else if(data.jayden > data.marshall){

      winnerText.innerText =
      "🏆 JAYDEN MENANG";

    }else{

      winnerText.innerText =
      "🤝 SERI";

    }

  }

}

load();

</script>

</body>
</html>
